name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (skip heavy deps for fast CI)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          # Minimal set to allow `import csieval` to succeed
          python -m pip install pyyaml pytest

      - name: Smoke import
        run: |
          python -c "import csieval; print('csieval', csieval.__version__)"
          python -c "from csieval import Evaluator, EvalConfig; print('public API ok')"
          python -c "from csieval.cli import main; print('cli.main importable')"
