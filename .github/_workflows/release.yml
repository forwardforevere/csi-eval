name: Build & Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Leave empty to build the current HEAD."
        required: false

jobs:
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for setuptools_scm if used later

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build setuptools wheel

      - name: Build
        run: python -m build

      - name: Inspect artifacts
        run: ls -la dist/

      - name: Validate with twine
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Smoke test the built wheel
        run: |
          set -e
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip
          # Install *without* torch/numpy first to skip the heavy CUDA build;
          # we only verify importability, not numerical correctness here.
          /tmp/wheel-venv/bin/pip install dist/*.whl || true
          /tmp/wheel-venv/bin/python -c "import csieval; print('csieval version:', csieval.__version__)"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the release
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
